# autoreduce self-test configuration
# Target: autoreduce reduces its own source code while keeping its tests green.

target_dir: "."

include:
  - "*.py"

exclude:
  - "tests/**"
  - "tests/*.py"

aggressiveness: moderate

constraints:
  test_suite:
    command: "uv run pytest tests/ -v"
    timeout: 60

  specs:
    - name: format
      command: "uv run ruff format ."

    - name: lint
      command: "uv run ruff check"

  reduce_tests:
    enabled: true
    coverage_command: "uv run pytest tests/ --cov=. --cov-report=term"
    coverage_pattern: "TOTAL\\s+\\S+\\s+\\S+\\s+(\\d+)%"
    min_delta: 0

metric:
  weights:
    lines_of_code: 1.0
    cyclomatic_complexity: 2.0
    nesting_depth: 3.0
    num_functions: 0.5
    num_classes: 0.5
    num_files: 1.0
    total_imports: 0.3
    duplicate_ratio: 5.0
